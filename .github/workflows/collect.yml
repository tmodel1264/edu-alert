name: 교육공고 수집

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = 한국시간 오전 9시
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 공고 수집 실행
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
        run: python collector/collect.py

      - name: 결과 저장(커밋)
        run: |
          git config user.name "edu-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/alerts.json
          git diff --cached --quiet || git commit -m "공고 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
